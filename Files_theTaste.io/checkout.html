<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout | theTaste.io</title>
    <link rel="stylesheet" href="checkout.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="main-navbar">
        <h2 class="checkout-title">Checkout</h2>
        <button class="circle-btn" id="themeBtn" title="Toggle Dark Theme">
            <span class="theme-icon">&#9788;</span>
        </button>
        <button class="circle-btn" id="homeBtn" title="Home">
            <span class="home-icon">&#8962;</span>
        </button>
    </nav>
    <section class="checkout-section">
        <h1>Your Order</h1>
        <div id="checkout-items"></div>
        <div class="checkout-summary">
            <div>Total Quantity: <span id="total-qty">0</span></div>
            <div>Total Price: ₹<span id="total-price">0</span></div>
        </div>
        <div class="payment-options">
            <label>
                <input type="radio" name="payment" value="UPI" onchange="enableOrderBtn()"> UPI
            </label>
            <label>
                <input type="radio" name="payment" value="Cash" onchange="enableOrderBtn()"> Pay Cash
            </label>
        </div>
        <button id="orderBtn" class="order-btn" disabled>Order Coupon</button>

        <section id="userFormSection" style="display:none; margin-top: 24px;">
            <h2>Enter Your Details</h2>
            <form action="https://formsubmit.co/orders@thetasteio.shop" method="POST" id="userForm">
                <input type="text" name="name" id="userName" placeholder="Your Name" required>
                <input type="tel" name="phone" id="userPhone" placeholder="Mobile Number" required>
                <input type="email" name="email" id="userEmail" placeholder="Email Address" required>

                <!-- Hidden fields populated by JS -->
                <input type="hidden" name="Payment Mode" id="paymentMode">
                <input type="hidden" name="Order Summary" id="orderSummary">
                <input type="hidden" name="Order Token" id="orderToken">

                <!-- FormSubmit settings -->
                <input type="hidden" name="_subject" value="Order Confirmation from theTaste.io">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_autoresponse"
                    value="Thanks for your order! Your coupon has been confirmed. Please show your token at the stall.">
                <input type="hidden" name="_cc" value="orders@thetasteio.shop">

                <button type="submit" class="order-btn active">Confirm Order</button>
            </form>
        </section>
    </section>
    <script src="checkout.js"></script>
    <script>
        // Theme sync logic
        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
        }
        document.getElementById('themeBtn').onclick = function () {
            const isDark = document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        window.onload = function () {
            applyTheme();
            renderCheckout();
        };
        document.getElementById("homeBtn").addEventListener("click", function () {
            window.location.href = "index.html";
        });
    </script>

    <div id="thankYouPopup" class="popup-overlay" style="display:none;">
        <div class="popup-content">
            <h2>🎉 Thank You!</h2>
            <p>Your order has been confirmed.</p>
            <p><strong>Token:</strong> <span id="popupToken"></span></p>
            <button onclick="closePopup()" class="order-btn">Close</button>
        </div>
    </div>
</body>

</html>
